name: Dependency Setup Checks

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  dependency-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install updater dependencies
        run: python -m pip install packaging

      - name: Check frontend dependency installation
        run: uv venv && uv pip sync pyproject.toml
        working-directory: frontend

      - name: Check backend shell scripts
        run: bash -n backend/setup-sigma-plugins.sh backend/launch-backends.sh

      - name: Check backend updater syntax
        run: python -m py_compile backend/update_sigma_plugins.py

      - name: Check pinned backend installation when version folders exist
        run: |
          if find backend -mindepth 1 -maxdepth 1 -type d -regextype posix-extended -regex '.*/[0-9]+\.[0-9]+\.[0-9]+' | grep -q .; then
            ./backend/setup-sigma-plugins.sh
          else
            echo "No pinned sigma version folders committed yet; skipping backend install test."
          fi
