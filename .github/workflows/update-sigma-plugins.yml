name: Update Sigma Plugins

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install updater dependencies
        run: python -m pip install packaging

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"

      - name: Generate pinned sigma backend plugins
        run: python backend/update_sigma_plugins.py

      - name: Install generated backend environments
        run: ./backend/setup-sigma-plugins.sh

      - name: Validate generated backend startup
        run: ./backend/validate-backend-startup.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-sigma-plugins
          commit-message: "chore: update pinned sigma backend plugins"
          title: "chore: update pinned sigma backend plugins"
          body: |
            Automated weekly refresh of the committed sigma backend plugin matrix.

            This PR was generated by `.github/workflows/update-sigma-plugins.yml`.
          delete-branch: true
